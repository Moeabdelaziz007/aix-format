[workspace]
members = [".", "benches"]

[package]
name = "aix-rust-core"
version = "0.1.0"
edition = "2021"
authors = ["AIX Team"]
description = "High-performance Rust core for AIX agent framework"

[lib]
crate-type = ["cdylib"]

[dependencies]
# FFI bindings
neon = { version = "1.0", default-features = false, features = ["napi-6"] }

# Async runtime
tokio = { version = "1.35", features = ["full"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3"

# Cryptography
ed25519-dalek = { version = "2.1", features = ["batch"] }
sha2 = "0.10"
rand = "0.8"

# SIMD and performance
memchr = "2.7"

# Error handling
anyhow = "1.0"
thiserror = "1.0"

# Concurrency
parking_lot = "0.12"
crossbeam = "0.8"

# Logging
tracing = "0.1"
tracing-subscriber = "0.3"

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
proptest = "1.4"
tokio-test = "0.4"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"

[profile.bench]
inherits = "release"

[[bench]]
name = "event_store"
harness = false

[[bench]]
name = "skill_cache"
harness = false

[[bench]]
name = "trust_chain"
harness = false