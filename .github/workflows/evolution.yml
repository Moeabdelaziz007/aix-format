name: 🧬 AIX Sovereign Evolution

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:      # Manual trigger

jobs:
  evolve:
    name: 🚀 Autonomous Self-Improvement
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Sovereign Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🟢 Setup Node.js (High-Speed Runtime)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: 📦 Install Dependencies
        run: pnpm install --frozen-lockfile

      - name: 🧬 Activate Meta-Loop & Wisdom Grafting
        run: npx tsx scripts/activate-meta-loop.ts --infinite
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          NOMIC_API_KEY: ${{ secrets.NOMIC_API_KEY }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST: "https://cloud.langfuse.com"

      - name: 🏥 Self-Heal & Report
        if: always()
        run: npm run health:check
        
      - name: 📬 Commit Lessons Learned
        if: always()
        run: |
          git config --local user.email "aix-agent@amrikyy.ai"
          git config --local user.name "AIX Sovereign Agent"
          git add .generated/HEALTH_REPORT.md
          git commit -m "chore(evolution): graft new wisdom and health metrics [skip ci]" || echo "No new lessons to commit"
          git push
