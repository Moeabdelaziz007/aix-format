name: Quality

on:
  pull_request:
  schedule:
    - cron: '0 0 * * 0'

jobs:
  dead-code:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dead Code Scan
        run: bash dead-code-scan.sh
        continue-on-error: true  # report but don't block
      - name: Upload dead code report
        uses: actions/upload-artifact@v4
          name: dead-code-report
          path: dead-code-report.txt
