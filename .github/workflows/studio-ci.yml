name: Studio CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

concurrency:
  group: studio-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  studio-build-check:
    name: Studio Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # ── Root install (workspace deps) ───────────────────────────────────
      - name: Install root dependencies
        run: pnpm install --no-frozen-lockfile

      # ── Studio install ──────────────────────────────────────────────────
      # `pnpm install` already runs from the workspace root above, so a second
      # install inside apps/studio would just re-resolve the same graph. We
      # keep this step for explicitness but pass only flags pnpm understands;
      # `--no-package-lock` is npm-only and made pnpm exit with
      # "Unknown option: 'package-lock'".
      - name: Install studio dependencies
        working-directory: apps/studio
        run: pnpm install --no-frozen-lockfile

      # ── Lint ────────────────────────────────────────────────────────────
      # pnpm does not implement `--if-present` for `pnpm run <script>`.
      # The flag was leaking through to eslint as a CLI arg and breaking
      # the step with `Invalid option '--if-present'`. The apps/studio
      # package always defines `lint`, so just invoke it directly.
      - name: Lint
        working-directory: apps/studio
        run: pnpm run lint
        env:
          UPSTASH_REDIS_REST_URL: https://placeholder.upstash.io
          UPSTASH_REDIS_REST_TOKEN: placeholder_token
          NEXT_PUBLIC_STUDIO_VERSION: "1.3.0"

      # ── Type-check ──────────────────────────────────────────────────────
      - name: TypeScript check
        working-directory: apps/studio
        run: pnpm exec tsc --noEmit
        env:
          UPSTASH_REDIS_REST_URL: https://placeholder.upstash.io
          UPSTASH_REDIS_REST_TOKEN: placeholder_token
          NEXT_PUBLIC_STUDIO_VERSION: "1.3.0"

      # ── Schema-Type Drift Check ─────────────────────────────────────────
      - name: Schema-Type Sync Verification
        run: pnpm run schema:sync:check
        env:
          CI: true

      # ── Health Score Check ──────────────────────────────────────────────
      - name: Codebase Health Score
        run: pnpm run health-score
        env:
          CI: true

      # ── Build ───────────────────────────────────────────────────────────
      - name: Build Next.js (Turbopack)
        working-directory: apps/studio
        run: pnpm run build
        env:
          UPSTASH_REDIS_REST_URL: https://placeholder.upstash.io
          UPSTASH_REDIS_REST_TOKEN: placeholder_token
          NEXT_PUBLIC_STUDIO_VERSION: "1.3.0"
          # Suppress Next.js telemetry in CI
          NEXT_TELEMETRY_DISABLED: 1

      # ── Core tests ──────────────────────────────────────────────────────
      # pnpm has no `--if-present` flag for `pnpm test`, so guard with a
      # shell check on the script definition in package.json instead.
      - name: Core unit tests
        run: |
          if node -e "process.exit(require('./package.json').scripts?.test ? 0 : 1)"; then
            pnpm test
          else
            echo "no 'test' script in $(pwd)/package.json — skipping"
          fi
        env:
          CI: true

  # ── Route validation smoke-test ────────────────────────────────────────
  route-validation:
    name: Validate studio routes
    runs-on: ubuntu-latest
    needs: studio-build-check
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for dead route imports
        run: |
          echo "Scanning for broken cross-package imports in apps/studio..."
          # Fail if any route still imports from outside apps/studio via ../../../../core/*
          if grep -r "from \"\.\.\./\.\.\./\.\.\./\.\.\./core" apps/studio/src --include="*.ts" --include="*.tsx"; then
            echo "ERROR: Found cross-package imports using relative paths into core/."
            echo "Use @/lib/* aliases instead (local copies live in apps/studio/src/lib/)."
            exit 1
          fi
          echo "✅ No broken cross-package imports found."
