name: Pattern Watcher
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  watch-patterns:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # --ignore-scripts prevents `prepare` tsc run during install
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run Pattern Analysis
        run: node scripts/pattern-watcher.js
