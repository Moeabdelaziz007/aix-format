name: CI — Build Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────
  # 1. TypeScript + Build (Node 22, matches local dev)
  # ─────────────────────────────────────────
  build:
    name: ⚙️ TypeScript + Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/studio
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: TypeScript check
        run: pnpm exec tsc --noEmit

      - name: Build
        run: pnpm run build
        env:
          NODE_ENV: production

      - name: Security audit (blocking on high/critical)
        run: pnpm audit --audit-level=high
        continue-on-error: false

  # ─────────────────────────────────────────
  # 2. Core package tests
  # ─────────────────────────────────────────
  test:
    name: 🧪 Core Package Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/aix-core
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - run: pnpm install --no-frozen-lockfile
      # pnpm does not support `--if-present` on `pnpm test`. Guard on
      # the script existing in package.json so this step is a no-op
      # when packages/aix-core has no `test` script defined.
      - run: |
          if node -e "process.exit(require('./package.json').scripts?.test ? 0 : 1)"; then
            pnpm test
          else
            echo "no 'test' script in $(pwd)/package.json — skipping"
          fi

