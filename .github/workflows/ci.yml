name: CI — Build Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: TypeScript + Build Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Use --ignore-scripts to prevent `prepare` from running tsc
      # during install (tsc is a build step, not an install step)
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: TypeScript check (root)
        run: npx tsc -p tsconfig.json --noEmit
        continue-on-error: true

      - name: TypeScript check (studio)
        working-directory: apps/studio
        run: npx tsc --noEmit

      - name: Build studio
        run: npm run build -w studio
        env:
          NODE_ENV: production

      - name: npm audit
        working-directory: apps/studio
        run: npm audit --audit-level=high
        continue-on-error: true

  test:
    name: Core Package Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # Run tests from repo root (packages/core has no package.json;
      # all core tests live in tests/ at repo root)
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run core tests
        run: npm test

  deploy:
    name: Deploy to Vercel
    needs: [build, test]        # ← BOTH must pass first
    if: |
      github.ref == 'refs/heads/main' && 
      github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy
        run: |
          npx vercel --prod \
            --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
