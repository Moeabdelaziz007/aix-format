name: CI — Build Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────
  # 1. TypeScript + Build (matches Vercel Node 24)
  # ─────────────────────────────────────────
  build:
    name: ⚙️ TypeScript + Build Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/studio
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --ignore-scripts

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Security audit (warn only — non-blocking)
        run: npm audit --audit-level=high || true

  # ─────────────────────────────────────────
  # 2. Core package tests
  # ─────────────────────────────────────────
  test:
    name: 🧪 Core Package Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/aix-core
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: pnpm install --ignore-scripts
      - run: npm test --if-present

  # ─────────────────────────────────────────
  # 3. Deploy to Vercel — only on main push
  # ─────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Vercel
    needs: [build, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Vercel CLI
        run: pnpm install -g vercel@latest

      - name: Pull Vercel Environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build for Vercel
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy prebuilt to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Smoke Test
        run: |
          sleep 10
          curl -sf https://aix-format-studio-git-main-axiom-id.vercel.app/api/mcp-discovery \
            || echo "⚠️ Smoke test warning — endpoint not ready yet"
