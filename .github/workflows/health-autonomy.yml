name: Health Score Autonomy

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for trend analysis

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Create .generated directory
        run: mkdir -p .generated

      - name: Run health score
        id: health-score
        run: |
          npm run health-score || echo "health_failed=true" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Run trend analysis
        id: trend-analysis
        run: |
          node scripts/health-trend.js --json > .generated/health-trend-output.json || echo "trend_failed=true" >> $GITHUB_OUTPUT
          cat .generated/health-trend-output.json
        continue-on-error: true
        env:
          BLOCK_ON_CRITICAL: 'true'

      - name: Upload health score artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: health-score-report
          path: .generated/health-score.json
          retention-days: 30

      - name: Upload trend analysis artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: health-trend-report
          path: |
            .generated/health-trend.json
            .generated/health-trend-output.json
          retention-days: 30

      - name: Post summary to GitHub Actions
        if: always()
        run: |
          echo "## 📊 Health Score Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f .generated/health-score.json ]; then
            SCORE=$(jq -r '.score' .generated/health-score.json)
            echo "**Overall Score:** ${SCORE}/100" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Metrics Breakdown" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            jq -r '.metrics | to_entries[] | "- **\(.key)**: \((.value * 100) | round)%"' .generated/health-score.json >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Health score file not found" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f .generated/health-trend-output.json ]; then
            TREND=$(jq -r '.trend' .generated/health-trend-output.json)
            VELOCITY=$(jq -r '.velocity' .generated/health-trend-output.json)
            CHANGE_7D=$(jq -r '.change_7d' .generated/health-trend-output.json)
            
            echo "### 📈 Trend Analysis" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- **Trend:** ${TREND}" >> $GITHUB_STEP_SUMMARY
            echo "- **7-day Change:** ${CHANGE_7D} points" >> $GITHUB_STEP_SUMMARY
            echo "- **Velocity:** ${VELOCITY} points/day" >> $GITHUB_STEP_SUMMARY
            
            # Add alerts if any
            ALERTS=$(jq -r '.alerts | length' .generated/health-trend-output.json)
            if [ "$ALERTS" -gt 0 ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### ⚠️ Alerts" >> $GITHUB_STEP_SUMMARY
              echo "" >> $GITHUB_STEP_SUMMARY
              jq -r '.alerts[] | "- \(.)"' .generated/health-trend-output.json >> $GITHUB_STEP_SUMMARY
            fi
          fi

      - name: Check for CRITICAL trend
        if: always()
        run: |
          if [ -f .generated/health-trend-output.json ]; then
            TREND=$(jq -r '.trend' .generated/health-trend-output.json)
            if [ "$TREND" = "CRITICAL" ]; then
              echo "❌ CRITICAL trend detected - blocking merge"
              exit 2
            fi
          fi

  auto-remediate:
    needs: health-check
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: 'pnpm-lock.yaml'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Download health score artifact
        uses: actions/download-artifact@v4
        with:
          name: health-score-report
          path: .generated/

      - name: Download trend analysis artifact
        uses: actions/download-artifact@v4
        with:
          name: health-trend-report
          path: .generated/
        continue-on-error: true

      - name: Check health score threshold
        id: check-threshold
        run: |
          if [ -f .generated/health-score.json ]; then
            SCORE=$(jq -r '.score' .generated/health-score.json)
            echo "Current score: $SCORE"
            
            # Use bc for floating point comparison
            if [ $(echo "$SCORE < 75" | bc -l) -eq 1 ]; then
              echo "needs_remediation=true" >> $GITHUB_OUTPUT
              echo "⚠️ Score below 75 - remediation needed"
            else
              echo "needs_remediation=false" >> $GITHUB_OUTPUT
              echo "✅ Score above 75 - no remediation needed"
            fi
          else
            echo "needs_remediation=false" >> $GITHUB_OUTPUT
            echo "⚠️ Health score file not found"
          fi

      - name: Generate GitHub issues for failing metrics
        if: steps.check-threshold.outputs.needs_remediation == 'true'
        run: node scripts/auto-issue-generator.js
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post remediation summary
        if: always()
        run: |
          echo "## 🤖 Auto-Remediation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.check-threshold.outputs.needs_remediation }}" = "true" ]; then
            echo "✅ Remediation actions triggered" >> $GITHUB_STEP_SUMMARY
            echo "- GitHub issues created for failing metrics" >> $GITHUB_STEP_SUMMARY
            echo "- Check the [Issues tab](../../issues?q=is%3Aissue+is%3Aopen+label%3Aauto-generated) for details" >> $GITHUB_STEP_SUMMARY
          else
            echo "ℹ️ No remediation needed - all metrics above threshold" >> $GITHUB_STEP_SUMMARY
          fi

