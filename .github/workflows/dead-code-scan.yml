# Dead Code Archaeology Scan
# Automated detection of orphaned exports that degrade agent performance over time.
# Runs on every PR and weekly on main branch.

name: Dead Code Scan

on:
  pull_request:
    paths:
      - 'packages/**'
      - 'core/**'
      - 'apps/**'
  push:
    branches:
      - main
  schedule:
    # Weekly scan every Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  dead-code-archaeology:
    name: Scan for Orphaned Exports
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git log analysis

      - uses: pnpm/action-setup@v4

      - name: Install ripgrep
        run: |
          sudo apt-get update
          sudo apt-get install -y ripgrep

      - name: Install jq
        run: |
          sudo apt-get install -y jq

      - name: Run Dead Code Scan
        id: scan
        run: |
          chmod +x scripts/dead-code-scan.sh
          ./scripts/dead-code-scan.sh || echo "scan_failed=true" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Upload Markdown Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dead-code-report-md
          path: .generated/dead-code-report.md
          retention-days: 30

      - name: Upload JSON Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dead-code-report-json
          path: .generated/dead-code-report.json
          retention-days: 90

      - name: Comment PR with Report
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = '.generated/dead-code-report.md';
            
            if (!fs.existsSync(reportPath)) {
              console.log('Report file not found');
              return;
            }
            
            const report = fs.readFileSync(reportPath, 'utf8');
            const truncatedReport = report.length > 65000 
              ? report.substring(0, 65000) + '\n\n... (truncated, see artifacts for full report)'
              : report;
            
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('Dead Code Archaeology Report')
            );
            
            const commentBody = `## 🔍 Dead Code Archaeology Report\n\n${truncatedReport}\n\n---\n*Generated by Dead Code Scanner*`;
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }

      - name: Create Weekly Issue
        if: github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const reportPath = '.generated/dead-code-report.md';
            
            if (!fs.existsSync(reportPath)) {
              console.log('Report file not found');
              return;
            }
            
            const report = fs.readFileSync(reportPath, 'utf8');
            const jsonPath = '.generated/dead-code-report.json';
            const jsonData = JSON.parse(fs.readFileSync(jsonPath, 'utf8'));
            
            const title = `📊 Weekly Dead Code Report - ${new Date().toISOString().split('T')[0]}`;
            const body = `## 🔍 Dead Code Archaeology - Weekly Scan\n\n` +
              `**Critical Issues**: ${jsonData.summary.critical}\n` +
              `**High Risk**: ${jsonData.summary.high}\n` +
              `**Medium Risk**: ${jsonData.summary.medium}\n` +
              `**Low Risk**: ${jsonData.summary.low}\n\n` +
              `---\n\n${report}\n\n` +
              `*This is an automated weekly report. Review and address critical issues.*`;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body.substring(0, 65000),
              labels: ['code-health', 'automated', 'dead-code']
            });

      - name: Check Critical Threshold
        if: steps.scan.outputs.scan_failed == 'true'
        run: |
          echo "❌ CRITICAL orphaned exports detected!"
          echo "Review the report and remove dead code before merging."
          exit 1

      - name: Success Summary
        if: steps.scan.outputs.scan_failed != 'true'
        run: |
          echo "✅ No critical dead code issues found"
          cat .generated/dead-code-report.md | head -20

