# Schema Drift Check
# Ensures types/parser.d.ts is always in sync with schemas/aix.schema.json.
# If an agent or human edits types/parser.d.ts manually without updating the schema,
# or updates the schema without regenerating types, this job FAILS and blocks the PR.

name: Schema Drift Check

on:
  pull_request:
    paths:
      - 'schemas/**'
      - 'types/**'
      - 'package.json'
      - 'package-lock.json'
  push:
    branches:
      - main
    paths:
      - 'schemas/**'
      - 'types/**'

jobs:
  schema-drift:
    name: Verify types/parser.d.ts matches aix.schema.json
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
      - uses: pnpm/action-setup@v4
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --ignore-scripts

      - name: Backup committed types/parser.d.ts
        run: cp types/parser.d.ts types/parser.d.ts.committed

      - name: Regenerate types from schema
        run: npm run generate:types:unified
        env:
          CI: true

      - name: Compare regenerated vs committed
        id: diff_check
        run: |
          if diff -u types/parser.d.ts.committed types/parser.d.ts > /tmp/schema_drift.diff 2>&1; then
            echo "drift=false" >> $GITHUB_OUTPUT
            echo "✅ No drift detected — types/parser.d.ts is in sync with aix.schema.json"
          else
            echo "drift=true" >> $GITHUB_OUTPUT
            echo "❌ SCHEMA DRIFT DETECTED — types/parser.d.ts is out of sync with aix.schema.json"
            echo ""
            echo "=== DIFF ==="
            cat /tmp/schema_drift.diff
          fi

      - name: Upload drift diff as artifact
        if: steps.diff_check.outputs.drift == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: schema-drift-diff
          path: /tmp/schema_drift.diff
          retention-days: 7

      - name: Fail if drift detected
        if: steps.diff_check.outputs.drift == 'true'
        run: |
          echo ""
          echo "🚨 BLOCKED: types/parser.d.ts has manual edits that diverge from aix.schema.json."
          echo ""
          echo "HOW TO FIX:"
          echo "  1. Edit schemas/aix.schema.json with your intended changes (NOT types/parser.d.ts directly)"
          echo "  2. Run: npm run generate:types:unified"
          echo "  3. Commit both schemas/aix.schema.json AND the regenerated types/parser.d.ts"
          echo ""
          echo "WHY: Per ARCH_DECISIONS.md ADR-001, aix.schema.json is the single source of truth."
          echo "     types/parser.d.ts is a generated artifact — never edit it manually."
          exit 1
