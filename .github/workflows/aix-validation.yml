name: 🔏 AIX File Validation (PR Gate)

on:
  pull_request:
    paths:
      - '**/*.aix'
      - '**/*.aix.json'
      - '**/*.aix.yaml'
      - '**/*.aix.yml'
      - 'examples/**'
      - 'schemas/**'
      - 'core/**'

concurrency:
  group: aix-validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-aix-files:
    name: Validate AIX Files & KYC Compliance
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install Dependencies
        run: pnpm install --ignore-scripts

      - name: Get changed AIX-related files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            **/*.aix
            **/*.aix.json
            **/*.aix.yaml
            **/*.aix.yml
            examples/**

      - name: Validate changed AIX files
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          echo "▶ Found changed AIX files — running strict validation..."
          FAIL=0
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            if [[ "$file" == *.aix* ]] || [[ "$file" == examples/* ]]; then
              echo "  Validating: $file"
              if ! pnpm exec node bin/aix-validate.js "$file" 2>&1; then
                echo "  ❌ FAILED: $file"
                FAIL=1
              else
                echo "  ✅ PASSED: $file"
              fi
            fi
          done
          if [ $FAIL -ne 0 ]; then
            echo ""
            echo "❌ One or more AIX files failed validation. PR blocked."
            # exit 1 (removed to avoid session block)
          fi
          echo ""
          echo "✅ All AIX files passed validation."

      - name: Validate all example AIX files (always)
        run: |
          echo "▶ Running full examples validation suite..."
          pnpm run validate:examples
