name: AIX Validation

on:
  pull_request:
    paths:
      - '**/*.aix'
      - '**/*.aix.json'
      - '**/*.aix.yaml'
      - '**/*.aix.yml'
      - '**/*.aix.toml'

jobs:
  validate-aix-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'

      - name: Install Dependencies
        run: npm ci

      - name: Get changed AIX files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: |
            **/*.aix
            **/*.aix.json
            **/*.aix.yaml
            **/*.aix.yml
            **/*.aix.toml

      - name: Validate changed AIX files (Strict KYC)
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          for file in ${{ steps.changed-files.outputs.all_changed_files }}; do
            echo "Validating $file..."
            node bin/aix-validate.js "$file" --strict-kyc --security
          done
