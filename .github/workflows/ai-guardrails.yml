# AI Code Guardrails
# "Don't trust — Verify" policy for all AI-generated code in this repository.
#
# Triggers on any PR to main. Detects AI-origin (Jules, Copilot, etc.) via:
#   1. Co-author pattern: google-labs-jules[bot]
#   2. PR label: ai-generated
#   3. Commit author patterns
#
# Per AGENT_GOVERNANCE.md: 30-60% of AI-generated code contains vulnerabilities.
# This workflow enforces the "Don't trust — Verify" posture.

name: 🤖 AI Code Guardrails

on:
  pull_request:
    branches: [main]

concurrency:
  group: ai-guardrails-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ─────────────────────────────────────────────
  # STEP 1: Detect if any commit in this PR is AI-authored
  # ─────────────────────────────────────────────
  detect-ai-origin:
    name: 🔍 Detect AI-Origin Commits
    runs-on: ubuntu-latest
    outputs:
      is_ai_pr: ${{ steps.detect.outputs.is_ai_pr }}
      has_high_risk_files: ${{ steps.detect_risk.outputs.has_high_risk_files }}
      high_risk_files: ${{ steps.detect_risk.outputs.high_risk_files }}

    steps:
      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect AI-authored commits
        id: detect
        run: |
          IS_AI="false"

          # Method 1: Check PR label
          LABELS=$(echo '${{ toJson(github.event.pull_request.labels) }}' | python3 -c "import sys,json; labels=json.load(sys.stdin); print(' '.join([l['name'] for l in labels]))" 2>/dev/null || echo "")
          if echo "$LABELS" | grep -qi "ai-generated\|jules\|copilot"; then
            echo "  🤖 Detected via PR label: $LABELS"
            IS_AI="true"
          fi

          # Method 2: Scan commit messages and co-authors in this PR
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          COMMITS=$(git log "${BASE_SHA}..${HEAD_SHA}" --format="%H %ae %s" 2>/dev/null || echo "")

          if echo "$COMMITS" | grep -qi "google-labs-jules\|jules\[bot\]\|copilot\[bot\]"; then
            echo "  🤖 Detected via commit author/message pattern"
            IS_AI="true"
          fi

          # Method 3: Scan commit full body for Co-authored-by
          CO_AUTHORS=$(git log "${BASE_SHA}..${HEAD_SHA}" --format="%b" 2>/dev/null | grep -i "Co-authored-by" || echo "")
          if echo "$CO_AUTHORS" | grep -qi "google-labs-jules\|jules\[bot\]\|copilot"; then
            echo "  🤖 Detected via Co-authored-by trailer"
            IS_AI="true"
          fi

          echo "is_ai_pr=${IS_AI}" >> $GITHUB_OUTPUT

          if [ "$IS_AI" = "true" ]; then
            echo "  ❗ AI-origin PR confirmed — full guardrails will run."
          else
            echo "  ✅ No AI-origin detected — running standard checks only."
          fi

      - name: Detect High-Risk file changes
        id: detect_risk
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "${BASE_SHA}..${HEAD_SHA}" 2>/dev/null || echo "")

          HIGH_RISK_PATTERNS=(
            "apps/studio/app/layout"
            "apps/studio/app/globals.css"
            "apps/studio/next.config"
            "apps/studio/components/AgenticKycSetup"
            "apps/studio/components/LiveValidator"
            "apps/studio/lib/pi-sdk"
            "security/"
            "economics/"
            ".github/workflows/"
            "AGENT_GOVERNANCE.md"
            "ARCH_DECISIONS.md"
          )

          FOUND_HIGH_RISK="false"
          MATCHED_FILES=""
          for pattern in "${HIGH_RISK_PATTERNS[@]}"; do
            MATCHES=$(echo "$CHANGED" | grep "$pattern" || true)
            if [ -n "$MATCHES" ]; then
              FOUND_HIGH_RISK="true"
              MATCHED_FILES="${MATCHED_FILES}${MATCHES}
"
            fi
          done

          echo "has_high_risk_files=${FOUND_HIGH_RISK}" >> $GITHUB_OUTPUT
          echo "high_risk_files<<EOF" >> $GITHUB_OUTPUT
          echo "$MATCHED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          if [ "$FOUND_HIGH_RISK" = "true" ]; then
            echo "  🚨 HIGH-RISK files changed:"
            echo "$MATCHED_FILES"
          else
            echo "  ✅ No High-Risk files changed."
          fi

  # ─────────────────────────────────────────────
  # STEP 2: AI Security Scan (runs ALWAYS on AI PRs)
  # ─────────────────────────────────────────────
  ai-security-scan:
    name: 🔐 AI Security Scan
    runs-on: ubuntu-latest
    needs: detect-ai-origin
    if: needs.detect-ai-origin.outputs.is_ai_pr == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.23.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --ignore-scripts

      - name: NPM Audit (Moderate+ Severity for AI PRs)
        run: |
          echo "Running npm audit with MODERATE threshold (stricter than default HIGH for AI PRs)..."
          npm audit --audit-level=moderate
        continue-on-error: false

      - name: Scan for forbidden patterns (Secrets / Keys)
        run: |
          echo "=== Scanning for hardcoded secrets and API keys ==="
          FAILED=0

          # PI Network keys / tokens
          if grep -rEn "(pi_api_key|PI_API_KEY|piApiKey)\s*[=:]\s*[\"'][^\"']+[\"']" \
              --include="*.ts" --include="*.js" --include="*.json" \
              --exclude-dir=node_modules --exclude-dir=.next .; then
            echo "❌ FORBIDDEN: Hardcoded Pi API key detected"
            FAILED=1
          fi

          # JWT tokens
          if grep -rEn "eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}" \
              --include="*.ts" --include="*.js" \
              --exclude-dir=node_modules --exclude-dir=.next .; then
            echo "❌ FORBIDDEN: Hardcoded JWT token detected"
            FAILED=1
          fi

          # Generic API key patterns
          if grep -rEn "(api_key|apiKey|API_KEY|secret_key|SECRET_KEY)\s*[=:]\s*[\"'][a-zA-Z0-9_\-]{20,}[\"']" \
              --include="*.ts" --include="*.js" \
              --exclude-dir=node_modules --exclude-dir=.next \
              --exclude="*.test.*" --exclude="*.spec.*" .; then
            echo "❌ FORBIDDEN: Potential hardcoded API key pattern detected"
            FAILED=1
          fi

          # Private key hex strings
          if grep -rEn "[\"'][0-9a-fA-F]{64}[\"']" \
              --include="*.ts" --include="*.js" \
              --exclude-dir=node_modules --exclude-dir=.next \
              --exclude="*.test.*" --exclude="*.schema.json" .; then
            echo "❌ FORBIDDEN: 64-char hex string (possible private key) detected"
            FAILED=1
          fi

          if [ "$FAILED" = "0" ]; then
            echo "✅ No hardcoded secrets found"
          else
            exit 1
          fi

      - name: Scan for forbidden git script patterns
        run: |
          echo "=== Scanning for git execution patterns in scripts ==="
          FAILED=0

          # Check for exec/spawn calling git
          if grep -rEn "(exec|spawn|execSync|spawnSync).*[\"'](git )" \
              --include="*.ts" --include="*.js" --include="*.py" \
              --exclude-dir=node_modules --exclude-dir=.next \
              --exclude="*pattern-watcher*" --exclude="*agent-sign*" .; then
            echo "❌ FORBIDDEN: Script executing git commands detected"
            echo "Per AGENT_GOVERNANCE.md Section 5: Agents must never execute git commands."
            FAILED=1
          fi

          # Check for direct git push / git commit in shell scripts
          if grep -rEn "^(git push|git commit|git reset|git rebase|git force)" \
              --include="*.sh" --exclude-dir=node_modules .; then
            echo "❌ FORBIDDEN: Shell script with git push/commit/reset detected"
            FAILED=1
          fi

          if [ "$FAILED" = "0" ]; then
            echo "✅ No forbidden git patterns found"
          else
            exit 1
          fi

      - name: Scan for unauthorized HTTP raw calls
        run: |
          echo "=== Scanning for raw HTTP calls bypassing identity layer ==="

          # Warn about raw fetch/axios without going through the AIX identity layer
          FOUND=$(grep -rEn "(fetch|axios)\([\"'](http://|https://(?!localhost))" \
            --include="*.ts" --include="*.js" \
            --exclude-dir=node_modules --exclude-dir=.next \
            --exclude="*.test.*" --exclude="*.spec.*" . 2>/dev/null || true)

          if [ -n "$FOUND" ]; then
            echo "⚠️  WARNING: Raw HTTP calls detected (review to ensure they pass through AIX identity layer):"
            echo "$FOUND"
            echo ""
            echo "These are not auto-blocked but must be reviewed. See AGENT_GOVERNANCE.md Section 5."
          else
            echo "✅ No raw HTTP calls bypassing identity layer found."
          fi

      - name: Scan for TokenBucket resurrection
        run: |
          echo "=== Checking ADR-002: TokenBucket must stay out of core ==="

          if grep -rEn "TokenBucket|token_bucket|tokenBucket" \
              --include="*.ts" --include="*.js" \
              core/ 2>/dev/null; then
            echo "❌ VIOLATION of ADR-002: TokenBucket found in core/"
            echo "Per ARCH_DECISIONS.md ADR-002: TokenBucket is out-of-scope for core."
            echo "Do not re-add rate-limiting to core without a new ADR decision."
            exit 1
          else
            echo "✅ ADR-002 compliant: No TokenBucket in core/"
          fi

  # ─────────────────────────────────────────────
  # STEP 3: Full Test Suite (AI PRs run ALL workspaces)
  # ─────────────────────────────────────────────
  ai-full-test:
    name: 🧪 AI PR — Full Test Suite
    runs-on: ubuntu-latest
    needs: detect-ai-origin
    if: needs.detect-ai-origin.outputs.is_ai_pr == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10.23.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --ignore-scripts

      - name: Run core test suite
        run: pnpm test
        env:
          CI: true

      - name: Run pattern watcher
        run: node scripts/pattern-watcher.js
        env:
          CI: true

      - name: TypeScript strict check (core)
        run: npx tsc --noEmit --strict
        continue-on-error: true

  # ─────────────────────────────────────────────
  # STEP 4: High-Risk Gate (blocks merge if AI + High-Risk without human label)
  # ─────────────────────────────────────────────
  high-risk-gate:
    name: 🚨 High-Risk Files Gate
    runs-on: ubuntu-latest
    needs: detect-ai-origin
    if: |
      needs.detect-ai-origin.outputs.is_ai_pr == 'true' &&
      needs.detect-ai-origin.outputs.has_high_risk_files == 'true'

    steps:
      - name: Check for human-reviewed label
        run: |
          LABELS=$(echo '${{ toJson(github.event.pull_request.labels) }}' | python3 -c "
import sys, json
labels = json.load(sys.stdin)
names = [l['name'] for l in labels]
print(' '.join(names))
" 2>/dev/null || echo "")

          echo "PR Labels: $LABELS"
          echo "High-Risk files changed:"
          echo "${{ needs.detect-ai-origin.outputs.high_risk_files }}"

          if echo "$LABELS" | grep -qi "human-reviewed"; then
            echo "✅ Human review confirmed via label 'human-reviewed'. Gate passed."
          else
            echo ""
            echo "🚨 BLOCKED: This AI-generated PR touches HIGH-RISK files."
            echo ""
            echo "HIGH-RISK files changed:"
            echo "${{ needs.detect-ai-origin.outputs.high_risk_files }}"
            echo ""
            echo "Per AGENT_GOVERNANCE.md Section 2 (Risk Tier Table):"
            echo "  AI PRs touching High-Risk files require HUMAN APPROVAL before merge."
            echo ""
            echo "TO UNBLOCK:"
            echo "  1. Mohamed reviews this PR"
            echo "  2. Mohamed adds the label 'human-reviewed' to the PR"
            echo "  3. Re-run this check"
            exit 1
          fi
