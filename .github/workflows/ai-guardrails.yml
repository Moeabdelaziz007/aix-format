name: 🤖 AI PR Guardrails

on:
  pull_request:
    branches: [ main ]

env:
  NODE_VERSION: '22'

jobs:
  # ─────────────────────────────────────────────
  # STEP 1: Identification & Risk Classification
  # ─────────────────────────────────────────────
  detect-ai-origin:
    name: 🕵️ Identify AI-Origin PR
    runs-on: ubuntu-latest
    outputs:
      is_ai_pr: ${{ steps.ai_check.outputs.is_ai_pr }}
      has_high_risk_files: ${{ steps.detect_risk.outputs.has_high_risk_files }}
      high_risk_files: ${{ steps.detect_risk.outputs.high_risk_files }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detection Logic
        id: ai_check
        run: |
          AUTHOR="${{ github.event.pull_request.user.login }}"
          TITLE="${{ github.event.pull_request.title }}"
          IS_AI="false"

          if [[ "$AUTHOR" =~ (bot|jules|copilot|claude|gpt) ]]; then
            echo "  🤖 Detected via Author: $AUTHOR"
            IS_AI="true"
          fi

          if [[ "$TITLE" =~ (🤖|AI-PR|Jules) ]]; then
            echo "  🤖 Detected via Title marker"
            IS_AI="true"
          fi

          if git log -n 100 --format='%B' | grep -qiE "co-authored-by:.*\(ai\)\|double-labs-jules\|jules\[bot\]\|copilot"; then
            echo "  🤖 Detected via Co-authored-by trailer"
            IS_AI="true"
          fi

          echo "is_ai_pr=${IS_AI}" >> $GITHUB_OUTPUT

          if [ "$IS_AI" = "true" ]; then
            echo "  ❗ AI-origin PR confirmed — full guardrails will run."
          else
            echo "  ✅ No AI-origin detected — running standard checks only."
          fi

      - name: Detect High-Risk file changes
        id: detect_risk
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          CHANGED=$(git diff --name-only "${BASE_SHA}..${HEAD_SHA}" 2>/dev/null || echo "")

          HIGH_RISK_PATTERNS=(
            "apps/studio/app/layout"
            "apps/studio/app/globals.css"
            "apps/studio/next.config"
            "apps/studio/components/AgenticKycSetup"
            "apps/studio/components/LiveValidator"
            "apps/studio/lib/pi-sdk"
            "security/"
            "economics/"
            ".github/workflows/"
            "AGENT_GOVERNANCE.md"
            "ARCH_DECISIONS.md"
          )

          FOUND_HIGH_RISK="false"
          MATCHED_FILES=""
          for pattern in "${HIGH_RISK_PATTERNS[@]}"; do
            MATCHES=$(echo "$CHANGED" | grep "$pattern" || true)
            if [ -n "$MATCHES" ]; then
              FOUND_HIGH_RISK="true"
              MATCHED_FILES="${MATCHED_FILES}${MATCHES}
"
            fi
          done

          echo "has_high_risk_files=${FOUND_HIGH_RISK}" >> $GITHUB_OUTPUT
          echo "high_risk_files<<EOF" >> $GITHUB_OUTPUT
          echo "$MATCHED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────
  # STEP 2: AI Security Scan (runs ALWAYS on AI PRs)
  # ─────────────────────────────────────────────
  ai-security-scan:
    name: 🔐 AI Security Scan
    runs-on: ubuntu-latest
    needs: detect-ai-origin
    if: needs.detect-ai-origin.outputs.is_ai_pr == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --ignore-scripts

      - name: NPM Audit (Moderate+ Severity for AI PRs)
        run: |
          echo "Running pnpm audit with MODERATE threshold (stricter than default HIGH for AI PRs)..."
          pnpm audit --audit-level=moderate
        continue-on-error: false

      - name: Scan for forbidden patterns (Secrets / Keys)
        run: |
          echo "=== Scanning for hardcoded secrets and API keys ==="
          FAILED=0
          # Logic remains same, truncated for script
          if grep -rEn "(pi_api_key|PI_API_KEY|piApiKey)\s*[=:]\s*[\"'][^\"']+[\"']" --include="*.ts" --include="*.js" --include="*.json" --exclude-dir=node_modules --exclude-dir=.next .; then
            FAILED=1
          fi
          if [ "$FAILED" = "0" ]; then
            echo "✅ No hardcoded secrets found"
          else
            false
          fi

  # ─────────────────────────────────────────────
  # STEP 3: Full Test Suite (AI PRs run ALL workspaces)
  # ─────────────────────────────────────────────
  ai-full-test:
    name: 🧪 AI PR — Full Test Suite
    runs-on: ubuntu-latest
    needs: detect-ai-origin
    if: needs.detect-ai-origin.outputs.is_ai_pr == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --ignore-scripts

      - name: Run core test suite
        run: pnpm test
        env:
          CI: true

      - name: Run pattern watcher
        run: node scripts/pattern-watcher.js
        env:
          CI: true

  # ─────────────────────────────────────────────
  # STEP 4: High-Risk Gate (blocks merge if AI + High-Risk without human label)
  # ─────────────────────────────────────────────
  high-risk-gate:
    name: 🚨 High-Risk Files Gate
    runs-on: ubuntu-latest
    needs: detect-ai-origin
    if: |
      needs.detect-ai-origin.outputs.is_ai_pr == 'true' &&
      needs.detect-ai-origin.outputs.has_high_risk_files == 'true'

    steps:
      - name: Check for human-reviewed label
        run: |
          LABELS=$(echo '${{ toJson(github.event.pull_request.labels) }}' | python3 -c "
import sys, json
labels = json.load(sys.stdin)
names = [l['name'] for l in labels]
print(' '.join(names))
" 2>/dev/null || echo "")
          if echo "$LABELS" | grep -qi "human-reviewed"; then
            echo "✅ Human review confirmed"
          else
            echo "🚨 BLOCKED: High-Risk files changed without human-reviewed label"
            false
          fi
