name: Sovereign Protocol Weekly Health Check

on:
  schedule:
    # Every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  health-check:
    name: Deep Architecture Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate Schema and Integrity
        run: |
          echo "Validating Schemas..."
          npm install -g ajv-cli
          ajv compile -s schemas/aix-enhanced.schema.json
          ajv compile -s schemas/manifest.schema.json

      - name: Run Health Check
        run: |
          echo "Running Deep Architecture Audit..."
          # Log audit date
          echo "Last Audit: $(date)" >> STATUS.md
          echo "Audited by Sovereign Protocol Maintainer GitHub Action." >> STATUS.md

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add STATUS.md
          git commit -m "docs: Weekly Architecture Audit update" || echo "No changes to commit"
