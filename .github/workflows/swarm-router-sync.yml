name: SwarmRouter Synchronization Check

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'swarm_router.go'
      - 'packages/aix-core/src/SwarmRouter.ts'
      - 'tests/swarm-router-sync.test.ts'
      - 'scripts/sync-swarm-router.sh'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'swarm_router.go'
      - 'packages/aix-core/src/SwarmRouter.ts'
      - 'tests/swarm-router-sync.test.ts'
      - 'scripts/sync-swarm-router.sh'
  workflow_dispatch:

jobs:
  sync-verification:
    name: Verify Go-TypeScript Synchronization
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need at least 2 commits for diff checking
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run SwarmRouter sync verification
        id: sync_check
        run: |
          chmod +x scripts/sync-swarm-router.sh
          ./scripts/sync-swarm-router.sh --verbose
        continue-on-error: true
      
      - name: Run TypeScript sync tests
        run: npm test -- tests/swarm-router-sync.test.ts
      
      - name: Check for implementation divergence
        if: steps.sync_check.outcome == 'failure'
        run: |
          echo "::error::SwarmRouter implementations are out of sync!"
          echo "::error::Please review the sync verification output above."
          echo "::error::Ensure TypeScript implementation matches Go behavior."
          exit 1
      
      - name: Verify CircuitBreaker presence
        run: |
          echo "Checking CircuitBreaker implementation..."
          if ! grep -q "class CircuitBreaker" packages/aix-core/src/SwarmRouter.ts; then
            echo "::error::CircuitBreaker class missing in TypeScript implementation"
            exit 1
          fi
          if ! grep -q "type CircuitBreaker struct" swarm_router.go; then
            echo "::error::CircuitBreaker struct missing in Go implementation"
            exit 1
          fi
          echo "✓ CircuitBreaker present in both implementations"
      
      - name: Verify RouterMetrics presence
        run: |
          echo "Checking RouterMetrics implementation..."
          if ! grep -q "class RouterMetrics" packages/aix-core/src/SwarmRouter.ts; then
            echo "::error::RouterMetrics class missing in TypeScript implementation"
            exit 1
          fi
          if ! grep -q "type RouterMetrics struct" swarm_router.go; then
            echo "::error::RouterMetrics struct missing in Go implementation"
            exit 1
          fi
          echo "✓ RouterMetrics present in both implementations"
      
      - name: Verify fallback chain limit
        run: |
          echo "Checking fallback chain limit..."
          if ! grep -q "slice(1, 4)" packages/aix-core/src/SwarmRouter.ts; then
            echo "::error::Fallback chain limit not set to 3 in TypeScript"
            exit 1
          fi
          if ! grep -q "i < 4" swarm_router.go; then
            echo "::error::Fallback chain limit not set to 3 in Go"
            exit 1
          fi
          echo "✓ Fallback chain limit consistent (max 3 agents)"
      
      - name: Check circuit breaker thresholds
        run: |
          echo "Verifying circuit breaker thresholds match..."
          TS_FAILURE=$(grep -oP "new CircuitBreaker\(\K\d+" packages/aix-core/src/SwarmRouter.ts | head -1)
          GO_FAILURE=$(grep -oP "NewCircuitBreaker\(\K\d+" swarm_router.go | head -1)
          
          if [ "$TS_FAILURE" != "$GO_FAILURE" ]; then
            echo "::error::Failure threshold mismatch: Go=$GO_FAILURE, TS=$TS_FAILURE"
            exit 1
          fi
          
          echo "✓ Circuit breaker thresholds match: failureThreshold=$TS_FAILURE"
      
      - name: Generate sync report
        if: always()
        run: |
          echo "## SwarmRouter Synchronization Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Files Checked" >> $GITHUB_STEP_SUMMARY
          echo "- \`swarm_router.go\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`packages/aix-core/src/SwarmRouter.ts\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`tests/swarm-router-sync.test.ts\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ steps.sync_check.outcome }}" == "success" ]; then
            echo "### ✅ Status: SYNCHRONIZED" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Both implementations are in sync and all tests passed." >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Status: OUT OF SYNC" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Action Required:** Review the divergences and update implementations." >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Key Features Verified" >> $GITHUB_STEP_SUMMARY
          echo "- CircuitBreaker with 3 states (Closed, Open, HalfOpen)" >> $GITHUB_STEP_SUMMARY
          echo "- RouterMetrics for observability" >> $GITHUB_STEP_SUMMARY
          echo "- Fallback chain limited to 3 agents" >> $GITHUB_STEP_SUMMARY
          echo "- Error discrimination (infrastructure vs task mismatch)" >> $GITHUB_STEP_SUMMARY
          echo "- Comprehensive logging" >> $GITHUB_STEP_SUMMARY
      
      - name: Comment on PR
        if: github.event_name == 'pull_request' && steps.sync_check.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚠️ **SwarmRouter Synchronization Check Failed**\n\n' +
                    'The Go and TypeScript implementations of SwarmRouter are out of sync.\n\n' +
                    'Please review the CI logs and ensure:\n' +
                    '1. CircuitBreaker behavior matches between implementations\n' +
                    '2. RouterMetrics tracking is consistent\n' +
                    '3. Fallback chain limits are identical (max 3 agents)\n' +
                    '4. Error discrimination logic is synchronized\n\n' +
                    'Run `./scripts/sync-swarm-router.sh` locally to verify sync before pushing.'
            })

  go-tests:
    name: Run Go SwarmRouter Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      
      - name: Run Go tests
        run: go test -v -race -coverprofile=coverage.out ./...
        working-directory: .
      
      - name: Check Go test coverage
        run: |
          go tool cover -func=coverage.out
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "Go test coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 70" | bc -l) )); then
            echo "::warning::Go test coverage is below 70%"
          fi

  typescript-tests:
    name: Run TypeScript SwarmRouter Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run TypeScript tests with coverage
        run: npm test -- tests/swarm-router-sync.test.ts --coverage
      
      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage/coverage-final.json
          flags: swarm-router
          name: swarm-router-coverage

